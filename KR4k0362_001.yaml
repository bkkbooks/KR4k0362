body:
  text: 謝靈運晉書武帝咸二年請禪位表曰夫唐虞內禪無兵戈之事故曰文德漢晉外禪有翦伐之事故曰順名以名而言安得不僭稱以為禪代邪文選干寶武帝革命論注武帝時禁絹扇書鈔一百三十四謝靈運論曰世祖受命禎祥屢臻苛慝不作萬國欣戴遠至邇安足以彰天啓其運民樂其功矣反古之道當以美事為先今五等罔刑弗由王制凡諸禮律未能是正而採擇嬪媛不拘華門者昔武王伐紂歸傾宮之女不以助紂為虐而世祖不皓納吳妓五千是同皓之弊婦人之封六國亂政如追贈外曾祖母違古之道凡此非事並見前書誠有玷于徽猷史氏所不敢蔽也御覽九十六惠帝元康二年巴西界竹生花紫色結實如麥初學記二十八御覽九百六十二懷帝永嘉五年劉曜王彌入于京都焚橈宗廟六宮幽辱愍懷太子妃王氏拔刀距賦賊曰吾皇太子妃義不為逆胡所汙遂見害御覽四百三十九百官志秦有太尉掌兵漢仍修之或置或省是故司馬之官主九伐之職初學記十一御覽二百七古者重武事貴射御取其捷御如僕各置一人尚書六人謂之八座參攝百揆出納王命古元凱之任也同上御覽二百十一以其總掌禁中書記謂之中書同上漢成帝已後無復中書之職同上漢官尚書為中臺御史為憲臺謁者為外臺是為三臺後漢蔡雍以侍御史遷尚書三日之間周遷三臺自漢罷御史大夫而憲臺猶置以丞為臺主中丞是也同上二十二御覽二百二十六通典二十四
